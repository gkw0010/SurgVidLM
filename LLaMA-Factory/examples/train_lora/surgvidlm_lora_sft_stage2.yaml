### model
# NOTE: :when in stage 2 training, set model_name_or_path to the path of ckpt of stage 1 
model_name_or_path: /mnt/data2/wgk/LLaMA-Factory/saves/model/merged/qwen2-vl-full-video #check
image_max_pixels: 262144
video_max_pixels: 16384
video_fps: 2 #check
trust_remote_code: true

### method
stage: sft
do_train: true

finetuning_type: lora
lora_rank: 8
lora_target: all

### dataset
dataset: svu-31k-video-clip #check
dataset_dir: /mnt/data2/wgk/surgvidlm_project/surgvidlm_open/LLaMA-Factory/data

template: surgvidlm
cutoff_len: 16384
max_samples: 50000 # for stage 2 training, set max_samples to 30000
overwrite_cache: true
preprocessing_num_workers: 8 # increase the number of workers to accelerate the preprocessing process
dataloader_num_workers: 2
preprocessing_batch_size: 128
# padding_side: left

### output
tokenized_path: /mnt/data2/wgk/surgvidlm_project/surgvidlm_open/LLaMA-Factory/saves/tokenizer/tokenizer_video_clip_stage2_2fps # check  it would take a long time to preprocess the dataset
output_dir: /mnt/data2/wgk/surgvidlm_project/surgvidlm_open/LLaMA-Factory/saves/lora/video_clip_stage2_2fps #check
logging_steps: 1
save_strategy: "steps"
save_steps: 284 #check
plot_loss: true
overwrite_output_dir: true
save_only_model: false

### train
per_device_train_batch_size: 2 # increase the batch_size based on our resource
gradient_accumulation_steps: 1 # increase the gradient_accumulation_steps to keep the effective batch size unchanged
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
flash_attn: fa2


